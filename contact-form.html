<!DOCTYPE html>

<head>
    <title>Form submission</title>
    <link rel="stylesheet" href="contact-form.css" />
</head>

<body>
    <h1 style="font-family:'Monomaniac One', sans-serif;margin-left:15%">Contact Us</h1>
    <div id="contact-form">
        <form action="mail_handler.php" method="post">
            First Name: <input type="text" name="first_name"><br>
            Last Name: <input type="text" name="last_name"><br>
            Email: <input type="text" name="email"><br>
            Message:<br><textarea rows="5" name="message" cols="30"></textarea><br>
            <input type="submit" name="submit" value="Submit">
        </form>

    </div>


</body>

<script>
    fetch('contact-form.html')
            .then(function (res) {
                if (!res.ok) throw new Error('Failed to load contact form');
                return res.text();
            })
            .then(function (html) {
                document.getElementById('contact-form').innerHTML = html;
            })
            .catch(function (err) {
                console.warn(err);
            });
</script>
